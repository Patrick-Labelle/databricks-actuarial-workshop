# ─── Declarative Pipeline: Medallion Architecture ─────────────────────────────
# Three connected medallion pipelines:
#   A) Reserve CDC:  raw_reserve_development → bronze_reserve_cdc → silver_reserves → gold_reserve_triangle
#   B) Claims:       raw_claims_events → bronze_claims → gold_claims_monthly
#   C) Macro:        raw_macro_indicators → bronze_macro → silver_macro → gold_macro_features
# Source notebook: src/01_data_pipeline.py

resources:
  pipelines:
    actuarial_workshop_dlt:
      name: "actuarial-workshop-medallion"
      # Unity Catalog target — tables are created in ${var.catalog}.${var.schema}
      catalog: "${var.catalog}"
      target: "${var.schema}"

      # Serverless preferred; falls back gracefully to classic compute
      serverless: true
      channel: CURRENT
      continuous: false

      # These key-value pairs are accessible in the notebook via spark.conf.get()
      configuration:
        catalog: "${var.catalog}"
        schema: "${var.schema}"
        notification_email: "${var.notification_email}"

      libraries:
        - notebook:
            path: ../src/01_data_pipeline.py
