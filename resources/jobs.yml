# ─── Jobs: Actuarial Workshop ─────────────────────────────────────────────────
# Two jobs:
#   1. actuarial_workshop_setup     — one-time full setup (Modules 1–5)
#   2. actuarial_workshop_refresh   — monthly model refresh (SDP pipeline + Module 4)
#
# All tasks run on the classic ML cluster (ray_ml_cluster) — single cluster spin-up,
# no per-task cold starts. Required for Ray-on-Spark, applyInPandas, psycopg2,
# FeatureEngineeringClient, and workspace file access for code_paths.

resources:
  jobs:

    # ── Full Setup Job ─────────────────────────────────────────────────────────
    # Run once to build all assets: source data, declarative pipeline, features,
    # statistical models, and the serving endpoint.
    actuarial_workshop_setup:
      name: "Actuarial Workshop — Full Setup"
      description: >-
        One-time setup: generates synthetic data, runs the declarative pipeline,
        builds the Feature Store, fits SARIMA/GARCH models, registers both
        models to UC, and creates the serving endpoints with AI Gateway.

      job_clusters:
        - job_cluster_key: ray_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "m5d.xlarge"
            num_workers: 4
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK

      tasks:

        # Task 1 — Generate synthetic source data (reserve CDC + claim events)
        - task_key: generate_source_data
          description: "Generate synthetic reserve CDC + claims data → raw_reserve_development, raw_claims_events"
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/01_data_pipeline.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              notification_email: "${var.notification_email}"

        # Task 1b — Fetch real macro data from Statistics Canada
        # Runs in parallel with generate_source_data — both handle schema creation
        # independently (CREATE SCHEMA IF NOT EXISTS). Must complete before
        # run_dlt_pipeline so that raw_macro_indicators is populated when the
        # SDP bronze_macro_indicators streaming table runs.
        - task_key: fetch_macro_data
          description: "Fetch StatCan unemployment, HPI, housing starts → raw_macro_indicators"
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../scripts/fetch_macro_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

        # Task 2 — Run the declarative pipeline (Bronze → Silver → Gold)
        # full_refresh: true because generate_source_data recreates source tables via
        # CREATE OR REPLACE TABLE, which invalidates any existing streaming checkpoint.
        - task_key: run_dlt_pipeline
          description: "SDP: Bronze → Silver (SCD Type 2) → Gold (reserve triangle + claims + macro)"
          depends_on:
            - task_key: generate_source_data
            - task_key: fetch_macro_data
          pipeline_task:
            pipeline_id: "${resources.pipelines.actuarial_workshop_dlt.id}"
            full_refresh: true

        # Task 3 — Register Feature Store table (Module 3)
        - task_key: build_feature_store
          description: "UC Feature Store registration (Online Table created by Module 5)"
          depends_on:
            - task_key: run_dlt_pipeline
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/02_feature_store.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              warehouse_id: "${var.warehouse_id}"

        # Task 4 — Fit SARIMAX / GARCH / Monte Carlo + register models (Module 4)
        - task_key: fit_statistical_models
          description: "SARIMAX/GARCH/Monte Carlo + register both models (SARIMA + MC) to UC"
          depends_on:
            - task_key: build_feature_store
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/03_classical_stats_at_scale.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

        # Task 5 — Prepare all app infrastructure (Module 5)
        - task_key: prepare_app_infrastructure
          description: "Serving endpoints + AI Gateway, Online Table, Lakebase DB setup, Genie Space"
          depends_on:
            - task_key: fit_statistical_models
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/04_model_serving.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              endpoint_name: "${var.endpoint_name}"
              mc_endpoint_name: "${var.mc_endpoint_name}"
              warehouse_id: "${var.warehouse_id}"
              pg_database: "${var.pg_database}"
              app_sp_client_id: "${resources.apps.actuarial_workshop_app.service_principal_client_id}"
              genie_space_id: "${var.genie_space_id}"

        # Task 6 — App setup: UC grants + model serving endpoint grants
        - task_key: setup_app_dependencies
          description: "Grant USE CATALOG/SCHEMA/SELECT to app SP; grant CAN_QUERY on all serving endpoints"
          depends_on:
            - task_key: prepare_app_infrastructure
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/ops/app_setup.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              app_sp_client_id: "${resources.apps.actuarial_workshop_app.service_principal_client_id}"
              endpoint_name: "${var.endpoint_name}"
              mc_endpoint_name: "${var.mc_endpoint_name}"
              genie_space_id: "${var.genie_space_id}"

        # Task 7 — Register chatbot as Databricks Agent
        - task_key: register_chatbot_agent
          description: "Register actuarial chatbot as Databricks Agent (AI Gateway visibility)"
          depends_on:
            - task_key: setup_app_dependencies
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/ops/register_agent.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              endpoint_name: "${var.endpoint_name}"
              mc_endpoint_name: "${var.mc_endpoint_name}"
              warehouse_id: "${var.warehouse_id}"
              llm_endpoint_name: "${var.llm_endpoint_name}"
              genie_space_id: "${var.genie_space_id}"

    # ── Monthly Model Refresh Job ──────────────────────────────────────────────
    # Scheduled job: refreshes data via the declarative pipeline then re-fits the SARIMA models.
    actuarial_workshop_refresh:
      name: "Actuarial Workshop — Monthly Model Refresh"
      description: >-
        Monthly scheduled job: refreshes Bronze→Silver→Gold via the declarative pipeline,
        then re-fits SARIMA/GARCH models and logs to MLflow.

      schedule:
        quartz_cron_expression: "0 0 3 1 * ?"
        timezone_id: "America/Toronto"
        pause_status: PAUSED

      job_clusters:
        - job_cluster_key: ray_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "m5d.2xlarge"
            num_workers: 4
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK

      tasks:

        - task_key: fetch_macro_data
          description: "Fetch latest StatCan macro indicators → raw_macro_indicators"
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../scripts/fetch_macro_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"

        - task_key: refresh_dlt_pipeline
          description: "Refresh Bronze→Silver→Gold via SDP Apply Changes (incl. macro SCD2)"
          depends_on:
            - task_key: fetch_macro_data
          pipeline_task:
            pipeline_id: "${resources.pipelines.actuarial_workshop_dlt.id}"
            full_refresh: false

        - task_key: refit_statistical_models
          description: "Re-fit SARIMAX/GARCH models on refreshed data with updated macro signals"
          depends_on:
            - task_key: refresh_dlt_pipeline
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/03_classical_stats_at_scale.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
