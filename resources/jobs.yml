# ─── Jobs: Actuarial Workshop ─────────────────────────────────────────────────
# Two jobs:
#   1. actuarial_workshop_setup     — one-time full setup (Modules 1–5)
#   2. actuarial_workshop_refresh   — monthly model refresh (SDP pipeline + Module 4)
#
# Schema layout:
#   - data_schema:   medallion pipeline (raw → bronze → silver → gold + features)
#   - models_schema: model outputs (predictions, UC models, AI Gateway monitoring)
#   - app_schema:    app consumption (Lakebase synced tables)
#
# All tasks run on the classic ML cluster (ray_ml_cluster) — single cluster spin-up,
# no per-task cold starts. Required for Ray-on-Spark, applyInPandas, psycopg2,
# FeatureEngineeringClient, and workspace file access for code_paths.

resources:
  jobs:

    # ── Full Setup Job ─────────────────────────────────────────────────────────
    # Run once to build all assets: source data, declarative pipeline, features,
    # statistical models, and the serving endpoint.
    actuarial_workshop_setup:
      name: "Actuarial Workshop — Full Setup"
      description: >-
        One-time setup: generates synthetic data, runs the declarative pipeline,
        builds the Feature Store, fits SARIMAX/GARCH + Bootstrap Chain Ladder models,
        registers both models to UC, and creates the serving endpoints with AI Gateway.

      job_clusters:
        - job_cluster_key: ray_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "m5d.xlarge"
            num_workers: 4
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK

      tasks:

        # Task 1 — Generate synthetic source data (reserve CDC + claim events)
        - task_key: generate_source_data
          description: "Generate synthetic reserve CDC + claims data → data_schema"
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/01_data_pipeline.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.data_schema}"
              notification_email: "${var.notification_email}"

        # Task 1b — Fetch real macro data from Statistics Canada
        - task_key: fetch_macro_data
          description: "Fetch StatCan unemployment, HPI, housing starts → data_schema"
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../scripts/fetch_macro_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.data_schema}"

        # Task 2 — Run the declarative pipeline (Bronze → Silver → Gold)
        - task_key: run_dlt_pipeline
          description: "SDP: Bronze → Silver (SCD Type 2) → Gold (reserve triangle + claims + macro)"
          depends_on:
            - task_key: generate_source_data
            - task_key: fetch_macro_data
          pipeline_task:
            pipeline_id: "${resources.pipelines.actuarial_workshop_dlt.id}"
            full_refresh: true

        # Task 3 — Register Feature Store table (Module 2)
        - task_key: build_feature_store
          description: "UC Feature Store registration → data_schema"
          depends_on:
            - task_key: run_dlt_pipeline
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/02_feature_store.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.data_schema}"
              warehouse_id: "${var.warehouse_id}"

        # Task 4 — Fit SARIMAX / GARCH / Bootstrap Chain Ladder + register models
        - task_key: fit_statistical_models
          description: "SARIMAX/GARCH/Bootstrap Chain Ladder → models_schema; reads from data_schema"
          depends_on:
            - task_key: build_feature_store
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/03_classical_stats_at_scale.py
            base_parameters:
              catalog: "${var.catalog}"
              data_schema: "${var.data_schema}"
              models_schema: "${var.models_schema}"

        # Task 4b — Set UC table & column descriptions for Genie / lineage
        - task_key: set_table_metadata
          description: "Add human-readable descriptions to all UC tables and columns"
          depends_on:
            - task_key: fit_statistical_models
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/ops/set_table_metadata.py
            base_parameters:
              catalog: "${var.catalog}"
              data_schema: "${var.data_schema}"
              models_schema: "${var.models_schema}"

        # Task 5 — Prepare all app infrastructure (Module 4)
        - task_key: prepare_app_infrastructure
          description: "Serving endpoints + AI Gateway, Online Table, Lakebase DB setup, Genie Space"
          depends_on:
            - task_key: set_table_metadata
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/04_model_serving.py
            base_parameters:
              catalog: "${var.catalog}"
              data_schema: "${var.data_schema}"
              models_schema: "${var.models_schema}"
              endpoint_name: "${var.endpoint_name}"
              mc_endpoint_name: "${var.mc_endpoint_name}"
              warehouse_id: "${var.warehouse_id}"
              pg_database: "${var.pg_database}"
              app_sp_client_id: "${resources.apps.actuarial_workshop_app.service_principal_client_id}"
              genie_space_id: "${var.genie_space_id}"

        # Task 6 — App setup: UC grants + model serving endpoint grants
        - task_key: setup_app_dependencies
          description: "Grant USE CATALOG/SCHEMA/SELECT to app SP on all 3 schemas"
          depends_on:
            - task_key: prepare_app_infrastructure
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/ops/app_setup.py
            base_parameters:
              catalog: "${var.catalog}"
              data_schema: "${var.data_schema}"
              models_schema: "${var.models_schema}"
              app_schema: "${var.app_schema}"
              app_sp_client_id: "${resources.apps.actuarial_workshop_app.service_principal_client_id}"
              endpoint_name: "${var.endpoint_name}"
              mc_endpoint_name: "${var.mc_endpoint_name}"
              genie_space_id: "${var.genie_space_id}"


    # ── Monthly Model Refresh Job ──────────────────────────────────────────────
    actuarial_workshop_refresh:
      name: "Actuarial Workshop — Monthly Model Refresh"
      description: >-
        Monthly scheduled job: refreshes Bronze→Silver→Gold via the declarative pipeline,
        then re-fits SARIMAX/GARCH + Bootstrap Chain Ladder models and logs to MLflow.

      schedule:
        quartz_cron_expression: "0 0 3 1 * ?"
        timezone_id: "America/Toronto"
        pause_status: PAUSED

      job_clusters:
        - job_cluster_key: ray_ml_cluster
          new_cluster:
            spark_version: "16.4.x-cpu-ml-scala2.12"
            node_type_id: "m5d.2xlarge"
            num_workers: 4
            aws_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK

      tasks:

        - task_key: fetch_macro_data
          description: "Fetch latest StatCan macro indicators → data_schema"
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../scripts/fetch_macro_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.data_schema}"

        - task_key: refresh_dlt_pipeline
          description: "Refresh Bronze→Silver→Gold via SDP Apply Changes (incl. macro SCD2)"
          depends_on:
            - task_key: fetch_macro_data
          pipeline_task:
            pipeline_id: "${resources.pipelines.actuarial_workshop_dlt.id}"
            full_refresh: false

        - task_key: refit_statistical_models
          description: "Re-fit SARIMAX/GARCH + Bootstrap Chain Ladder models on refreshed data"
          depends_on:
            - task_key: refresh_dlt_pipeline
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/03_classical_stats_at_scale.py
            base_parameters:
              catalog: "${var.catalog}"
              data_schema: "${var.data_schema}"
              models_schema: "${var.models_schema}"

        - task_key: set_table_metadata
          description: "Refresh UC table and column descriptions"
          depends_on:
            - task_key: refit_statistical_models
          job_cluster_key: ray_ml_cluster
          notebook_task:
            notebook_path: ../src/ops/set_table_metadata.py
            base_parameters:
              catalog: "${var.catalog}"
              data_schema: "${var.data_schema}"
              models_schema: "${var.models_schema}"
